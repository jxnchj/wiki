<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Hanson 知识库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --base-font-size: 16px; --theme-color: #42b983; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .sidebar { background-color: #fafafa; }
    .sidebar-nav li { margin: 8px 0; }
    .sidebar-nav a { color: #666; font-size: 14px; }
    .sidebar-nav a:hover { color: #42b983; }
    .sidebar-nav .active a { color: #42b983; font-weight: 600; }
    .markdown-section h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
    .markdown-section h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Hanson 知识库',
      repo: '',
      loadSidebar: 'sidebar.md',
      loadNavbar: false,
      homepage: 'README.md',
      routerMode: 'hash',
      subMaxLevel: 3,
      auto2top: true,
      alias: {
        '/.*/sidebar.md': '/sidebar.md'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
